<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CONNECT FOUR</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Press+Start+2P&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #05050f;
      background-image:
        radial-gradient(ellipse at 50% 30%, rgba(10, 20, 60, 0.5) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 80%, rgba(20, 5, 40, 0.3) 0%, transparent 50%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Orbitron', 'Press Start 2P', sans-serif;
    }
    #game-container {
      position: relative;
    }
    canvas {
      image-rendering: auto;
      border: 1px solid rgba(50, 100, 255, 0.3);
      box-shadow:
        0 0 30px rgba(30, 60, 200, 0.3),
        0 0 80px rgba(30, 60, 200, 0.1),
        0 0 120px rgba(80, 40, 200, 0.05),
        inset 0 0 40px rgba(10, 20, 80, 0.15);
      border-radius: 6px;
    }
    .scanlines {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0, 0, 0, 0.015) 3px,
        rgba(0, 0, 0, 0.015) 6px
      );
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game"></canvas>
    <div class="scanlines"></div>
  </div>
  <script src="bundle.js"></script>
</body>
</html>
